name: Build Nanobot Community Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Nanobot Release Tag to build (e.g., v0.1.4.post6 or main)'
        required: true
        default: 'v0.1.4.post6'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout upstream Nanobot repository
        uses: actions/checkout@v4
        with:
          repository: 'HKUDS/nanobot'
          ref: ${{ github.event.inputs.tag }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/shudh/nanobot-community:${{ github.event.inputs.tag }}
            ghcr.io/shudh/nanobot-community:latest
